# fly.toml app configuration file generated for rain-alert-bot on 2026-03-10T09:28:53Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'rain-alert-bot'
primary_region = 'sin'

[build]

[deploy]
  strategy = "immediate"  # Stop old instance before starting new (no overlap)

[env]
  PORT = "8080"
  DEFAULT_LAT = "-6.1672"
  DEFAULT_LON = "106.8341"
  DATA_DIR = "/app/data"

# Use [[services]] instead of [http_service] to prevent Fly from
# treating this as a pure HTTP app and stopping it due to "no traffic"
[[services]]
  internal_port = 8080
  protocol = "tcp"

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  # Health check keeps the machine marked as alive
  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256

[[mounts]]
  source = "bot_data"
  destination = "/app/data"
